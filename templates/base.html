<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UAV Waste Detection{% endblock %}</title>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        /* ==================== NAVBAR ==================== */
        nav {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0 24px;
            display: flex;
            align-items: center;
            height: 56px;
            gap: 24px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav .logo {
            font-size: 1.1rem;
            font-weight: 700;
            color: #38bdf8;
            text-decoration: none;
        }
        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: .9rem;
            padding: 6px 12px;
            border-radius: 6px;
            transition: .15s;
        }
        nav a:hover,
        nav a.active {
            background: #334155;
            color: #e2e8f0;
        }
        .nav-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .user-email {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .logout-btn {
            background: #ef4444;
            color: white;
            padding: 6px 14px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .logout-btn:hover {
            background: #dc2626;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <a class="logo" href="/">🛸 UAV Detect</a>
        <a href="/" {% if request.path == '/' %}class="active"{% endif %}>Detect</a>
        <a href="/dashboard" {% if request.path == '/dashboard' %}class="active"{% endif %}>Dashboard</a>
        
        <div class="nav-right">
            <span class="user-email">{{ session['user']['email'] }}</span>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </nav>

    <!-- Page Content -->
    {% block content %}{% endblock %}

</body>
</html>
