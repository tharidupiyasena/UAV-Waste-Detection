<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | UAV Waste Detection</title>
    <style>
        /* Same styles as login.html - you can copy them */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #1e2937;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }
        .logo { text-align: center; font-size: 2.2rem; margin-bottom: 8px; }
        h1 { text-align: center; color: #38bdf8; margin-bottom: 8px; }
        .subtitle { text-align: center; color: #64748b; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 6px; color: #94a3b8; }
        input {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 1px solid #475569;
            border-radius: 8px;
            color: white;
        }
        input:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
        }
        .flash { padding: 12px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .error { background: #7f1d1d; color: #fda4af; }
        .links { text-align: center; margin-top: 25px; color: #64748b; }
        .links a { color: #38bdf8; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">🛸</div>
        <h1>Create Account</h1>
        <p class="subtitle">Join the UAV Waste Detection System</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash error">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required minlength="6">
            </div>
            <button type="submit" class="btn">Register</button>
        </form>

        <div class="links">
            Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </div>
    </div>
</body>
</html>
